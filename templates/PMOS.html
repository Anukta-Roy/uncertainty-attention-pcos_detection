<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCOS Detection System</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;

            background-image:
            linear-gradient(rgba(0,0,0,0.55),
            rgba(0,0,0,0.55)),
            url('https://images.unsplash.com/photo-1579684385127-1ef15d508118?q=80&w=1200&auto=format&fit=crop');

            background-size:cover;
            background-position:center;

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .container{
            text-align:center;
            color:white;
        }

        .title{
            font-size:60px;
            font-weight:bold;
            color:#ff69b4;
            margin-bottom:10px;
        }

        .subtitle{
            font-size:24px;
            margin-bottom:40px;
        }

        .upload-box{

            width:650px;

            background:rgba(255,255,255,0.96);

            padding:50px;

            border-radius:20px;

            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        .upload-box h2{
            color:black;
            margin-bottom:30px;
            font-size:38px;
        }

        input[type="file"]{
            margin-top:20px;
            font-size:16px;
        }

        .btn{

            margin-top:25px;

            padding:14px 35px;

            border:none;

            background:#ff1493;

            color:white;

            font-size:18px;

            border-radius:8px;

            cursor:pointer;

            transition:0.3s;
        }

        .btn:hover{
            background:#d10074;
        }

        #preview{

            margin-top:25px;

            max-width:320px;

            display:none;

            border-radius:12px;

            border:4px solid #ff69b4;
        }

        .result{

            margin-top:30px;

            font-size:28px;

            font-weight:bold;

            color:#ff1493;
        }

        @media(max-width:768px){

            .upload-box{
                width:90%;
                padding:30px;
            }

            .title{
                font-size:40px;
            }

            .upload-box h2{
                font-size:28px;
            }

            .subtitle{
                font-size:18px;
            }
        }

    </style>
</head>

<body>

    <div class="container">

        <div class="title">
            PCOS DETECTION
        </div>

        <div class="subtitle">
            AI-Based Ultrasound Analysis System
        </div>

        <div class="upload-box">

            <h2>Upload Ultrasound Image</h2>

            <form action="/predict" method="POST" enctype="multipart/form-data">

                <input
                    type="file"
                    id="imageInput"
                    name="image"
                    accept="image/*"
                    required
                    onchange="previewImage()"
                >

                <br>

                <button class="btn" type="submit">
                    Predict
                </button>

            </form>

            <img id="preview">

            {% if result %}
                <div class="result">
                    {{ result }}
                </div>
            {% endif %}

        </div>

    </div>

    <script>

        function previewImage(){

            const fileInput = document.getElementById("imageInput");

            const preview = document.getElementById("preview");

            const file = fileInput.files[0];

            if(file){

                const reader = new FileReader();

                reader.onload = function(e){

                    preview.src = e.target.result;

                    preview.style.display = "block";
                }

                reader.readAsDataURL(file);
            }
        }

    </script>

</body>

</html>
